<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Нет сети — ЛапМаркет</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, sans-serif;
        background: #ecfdf5;
        color: #292524;
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        font-size: 0.9rem;
        color: #57534e;
        margin: 0 0 1.25rem;
        line-height: 1.5;
      }
      a,
      button {
        display: inline-block;
        padding: 0.65rem 1.25rem;
        border-radius: 0.75rem;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        border: none;
        cursor: pointer;
        background: #059669;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет подключения к интернету</h1>
      <p>Проверьте Wi‑Fi или мобильную сеть и попробуйте снова.</p>
      <button type="button" onclick="location.reload()">Обновить</button>
    </main>
  </body>
</html>
